services:
  - type: web
    name: warriors-training-zone-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: warriors_gym
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: ADMIN_EMAIL
        value: admin@warriors.com
      - key: ADMIN_PASSWORD
        sync: false
